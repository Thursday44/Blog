{{ define "main" }}
<article style="max-width: 800px; margin: 40px auto; padding: 20px; font-family: sans-serif; line-height: 1.6;">
  {{ if .Params.image }}
  <img src="{{ .Params.image }}" style="width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px;">
  {{ end }}
  
  <h1 style="font-size: 2.5rem; margin-bottom: 10px;">{{ .Title }}</h1>
  
  <div style="color: #666; margin-bottom: 30px;">
    <span>{{ .Date.Format "January 2, 2006" }}</span> | 
    <span style="text-transform: uppercase; font-weight: bold;">{{ .Params.category }}</span>
  </div>

  <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">

  <div class="essay-content" style="font-size: 1.1rem; color: #333;">
    {{ .Content }}
  </div>
</article>
{{ end }}
