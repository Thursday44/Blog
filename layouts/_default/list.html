<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* Variables */
    :root {
      --navy:      #1a2744;
      --blue:      #2c4a8a;
      --pink:      #e8a0b0;
      --blush:     #f7dde4;
      --cream:     #fdf6f0;
      --offwhite:  #faf8f6;
      --white:     #ffffff;
      --ink:       #2a2118;
      --muted:     #7a6f68;
      --border:    #edddd4;
      --warm:      #f2ebe3;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', sans-serif;
    }

    /* Dark Mode */
    body.dark-theme {
      --navy:      #f7dde4;
      --blue:      #e8a0b0;
      --cream:     #121212;
      --white:     #1e1e1e;
      --ink:       #fdf6f0;
      --muted:     #a09893;
      --border:    #333333;
      --warm:      #1a1a1a;
    }

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      line-height: 1.75;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    /* Navigation */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(253, 246, 240, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 6%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    body.dark-theme nav { background: rgba(18, 18, 18, 0.94); }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 400;
      font-style: italic;
      color: var(--navy);
      letter-spacing: 0.02em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--navy); }
    .nav-links .nav-home {
      background: var(--blush);
      color: var(--navy);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      font-size: 0.78rem;
    }
    .nav-links .nav-home:hover { background: var(--pink); }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--navy);
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.2s;
      font-family: var(--sans);
    }
    .theme-toggle:hover { background: var(--navy); color: var(--white); }

    /* Mobile nav */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--navy);
      transition: 0.3s;
    }
    .mobile-menu {
      display: none;
      position: fixed;
      top: 64px; left: 0; right: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 6%;
      z-index: 99;
      flex-direction: column;
      gap: 1.2rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Header */
    .blog-header {
      padding: 9rem 6% 5rem;
      background: linear-gradient(160deg, var(--cream) 60%, var(--blush) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    body.dark-theme .blog-header { background: var(--cream); }
    .blog-header::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, var(--blush) 0%, transparent 70%);
      opacity: 0.6;
      pointer-events: none;
    }
    .header-inner {
      max-width: 680px;
      position: relative;
      z-index: 1;
    }
    .header-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 1rem;
      display: block;
    }
    .blog-title {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300;
      color: var(--navy);
      line-height: 1.05;
      margin-bottom: 1.2rem;
      letter-spacing: -0.01em;
    }
    .blog-title em {
      font-style: italic;
      color: var(--blue);
    }
    .blog-tagline {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.85;
      max-width: 540px;
    }

    /* Search */
    .search-section {
      padding: 3rem 6%;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .search-hint {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 0.85rem;
      font-style: italic;
    }
    .search-wrapper {
      display: flex;
      max-width: 560px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--cream);
      transition: border-color 0.2s;
    }
    .search-wrapper:focus-within { border-color: var(--blue); background: var(--white); }
    .search-wrapper input {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: none;
      background: transparent;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
    }
    .search-wrapper input::placeholder { color: var(--muted); font-style: italic; }
    .search-btn {
      background: var(--navy);
      color: var(--white);
      border: none;
      padding: 0.9rem 1.4rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: var(--sans);
      transition: background 0.2s;
    }
    .search-btn:hover { background: var(--blue); }
    .search-results-info {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      min-height: 1.2em;
    }

    /* Categories */
    .categories-bar {
      padding: 1.5rem 6%;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .cat-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.5rem;
    }
    .cat-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 0.35rem 1rem;
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .cat-btn:hover, .cat-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--white);
    }

    /* Essays Feed */
    .essays-section {
      padding: 4rem 6%;
      max-width: 1100px;
      margin: 0 auto;
    }
    .essays-feed {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }
    .essay-card {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 2.5rem;
      align-items: start;
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .essay-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(26, 39, 68, 0.09);
    }
    .essay-image {
      height: 220px;
      overflow: hidden;
      background: var(--blush);
      flex-shrink: 0;
    }
    .essay-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .essay-card:hover .essay-image img { transform: scale(1.04); }
    .essay-body { padding: 2rem 2rem 2rem 0; }
    .essay-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .essay-category {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--white);
      background: var(--blue);
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .essay-date { font-size: 0.8rem; color: var(--muted); }
    .essay-read-time {
      font-size: 0.8rem;
      color: var(--pink);
      font-weight: 500;
      font-style: italic;
    }
    .essay-title {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 2.5vw, 1.9rem);
      font-weight: 400;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 0.75rem;
      transition: color 0.2s;
    }
    .essay-title a:hover { color: var(--blue); }
    .essay-preview {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 1.2rem;
    }
    .essay-read-more {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: gap 0.2s;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .essay-card:hover .essay-read-more { gap: 0.7rem; }

    /* No results */
    .no-results {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .no-results p {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-style: italic;
      margin-bottom: 0.5rem;
      color: var(--navy);
    }
    .no-results span { font-size: 0.9rem; }

    /* Newsletter */
